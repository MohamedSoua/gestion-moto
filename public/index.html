<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Pièces Moto</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="mobile-topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="mobile-title">🏍️ Pièces Moto</span>
  <span style="width:32px"></span>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">🏍️</span>
    <div><h1>Pièces Moto</h1><p>Gestion du magasin</p></div>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <a class="nav-item active" data-page="dashboard">📊 Tableau de bord</a>
    <a class="nav-item" data-page="stock">📦 Stock & inventaire</a>
    <a class="nav-item" data-page="ventes">🛒 Nouvelle vente</a>
    <a class="nav-item" data-page="historique">📋 Historique ventes</a>
    <div class="nav-section">Gestion</div>
    <a class="nav-item" data-page="achats">🚚 Achats & réceptions</a>
    <a class="nav-item" data-page="fournisseurs">🏭 Fournisseurs</a>
    <a class="nav-item" data-page="clients">👥 Clients</a>
    <div class="nav-section">Analyse</div>
    <a class="nav-item" data-page="rapports">📈 Rapports & stats</a>
  </nav>
</div>

<div class="main">
  <div id="page-dashboard" class="page active"></div>
  <div id="page-stock" class="page"></div>
  <div id="page-ventes" class="page"></div>
  <div id="page-historique" class="page"></div>
  <div id="page-achats" class="page"></div>
  <div id="page-fournisseurs" class="page"></div>
  <div id="page-clients" class="page"></div>
  <div id="page-rapports" class="page"></div>
</div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button onclick="closeModal()" class="btn btn-sm">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="ticket-overlay" class="modal-overlay">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3>🧾 Ticket de vente</h3><button onclick="closeTicket()" class="btn btn-sm">✕</button></div>
    <div class="modal-body" id="ticket-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="window.print()">🖨️ Imprimer</button>
      <button class="btn btn-primary" onclick="closeTicket()">Fermer</button>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('open');
      }
    });
  });
});
</script>
<script src="/js/app.js"></script>
</body>
</html>
